<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <aside th:fragment="sidebar" class="sidebar">
        <div class="sidebar-brand">
            <div class="sidebar-logo-icon"><i class="bi bi-briefcase"></i></div>
            <div class="sidebar-brand-name">TechMada RH<span>Espace employé</span></div>
        </div>
        <ul class="sidebar-nav" style="margin-top:1rem">
            <li><a th:href="@{#page-dashboard-employe}"><i class="bi bi-grid-1x2"></i> Tableau de bord</a></li>
            <li><a th:href="@{#page-form-conge}" th:classappend="${active == 'form'} ? 'active'"><i class="bi bi-plus-circle"></i> Nouvelle demande</a></li>
            <li><a th:href="@{#page-mes-conges}" th:classappend="${active == 'liste'} ? 'active'"><i class="bi bi-calendar3"></i> Mes demandes</a></li>
            <li><a th:href="@{#page-profil-employe}"><i class="bi bi-person"></i> Mon profil</a></li>
        </ul>
        <div class="sidebar-user">
            <div class="s-user-row">
                <div class="avatar av-green" th:text="${#strings.substring(employe.nom, 0, 1)} + ${#strings.substring(employe.prenom, 0, 1)}">SR</div>
                <div>
                    <div class="user-name" th:text="${employe.nom} + ' ' + ${employe.prenom}">Soa Rakoto</div>
                    <div class="user-role" th:text="${employe.poste} + ' · ' + ${employe.service}">Employé · IT</div>
                </div>
            </div>
        </div>
    </aside>
</body>
</html>
