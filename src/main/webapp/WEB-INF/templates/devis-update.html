<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/ressources/css/style.css}">
    <title>devis</title>
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container">
        <div class="form-card">
            <div class="card-header">
                <h4>Mise a jour de devis</h4>
            </div>
            <div class="card-body">

    <form th:action="@{/update-devis}" method="post" id="formulaire">
        <p>Demande <input type="number" th:value="${devis.getDemande().getId_demande()}" name="id_demande"
                id="id_demande"></p>

        <div id="info">
            <div class="materiel-row" th:each="materiel : ${devis.getDevis_materiels()}">
                <label>Nom
                    <input type="text" name="nom" th:value="${materiel.getLibelle()}" required>
                </label>
                <label>Prix unitaire
                    <input type="number" name="pU" th:value="${materiel.getPrix_unitaire()}" step="0.01"
                        value="0" min="0" required>
                </label>
                <label>Quantite
                    <input type="number" name="quantite" th:value="${materiel.getQuantite()}" value="0" min="0"
                        required>
                </label>
                <button type="button" class="btn-remove-row" onclick="this.closest('.materiel-row').remove()">Supprimer</button>
            </div>
        </div>

        <p>Type :
            <select name="typeId" id="typeId">
                <option value="">--Selectionnez un type --</option>
                <option th:each="type : ${types}" th:value="${type.getId_type()}" th:text="${type.getLibelle()}"
                    th:selected="${type.getId_type()} == ${devis.getTypeDevis().getId_type()}">
                </option>
            </select>
        </p>

        <p>Date <input type="datetime-local" name="date_creation"
            th:value="${devis.getDate_creation() != null ? #temporals.format(devis.getDate_creation(), 'yyyy-MM-dd''T''HH:mm') : ''}"></p>

        <input type="hidden" name="id_devis" th:value="${devis.getId_devis()}">
        <input class="btn-submit" type="submit" value="Enregistrer ce devis">
    </form>

    <button type="button" onclick="newDevis()">Ajout de champ</button>

    <script th:inline="javascript">
        const typeSelect = document.getElementById('typeId');
        const originalTypeOptions = typeSelect ? typeSelect.innerHTML : '';

        document.getElementById('id_demande').addEventListener('blur', function () {
            const demandeId = this.value.trim();

            if (!demandeId) return;

            const url = /*[[@{/demandeJSON/{id}(id=${0})}]]*/ ''
                .replace('0', demandeId);

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    if (!data || Object.keys(data).length === 0) {
                        const p = document.createElement("p");
                        p.textContent = "Aucune demande correpondante";
                        const div = document.getElementById("info");
                        div.innerHTML = "";
                        div.appendChild(p);
                        if (typeSelect) typeSelect.innerHTML = originalTypeOptions;
                        return;
                    }

                    const div = document.getElementById("info");
                    div.innerHTML = "";

                    const nomClient = document.createElement("p");
                    nomClient.textContent = "Nom : " + (data.demande && data.demande.client ? data.demande.client.nom_client : '');
                    div.appendChild(nomClient);

                    const lieu = document.createElement("p");
                    lieu.textContent = "Lieu " + (data.demande ? data.demande.lieu : '');
                    div.appendChild(lieu);

                    const adresse = document.createElement("p");
                    adresse.textContent = "Adresse : " + (data.demande && data.demande.client ? data.demande.client.adresse : '');
                    div.appendChild(adresse);

                    // Si le devis est rejeté (devis_rejete === 1) n'afficher que l'option 'Etude'
                    if (typeSelect) {
                        if (data.devis_rejete === 1) {
                            for (let i = typeSelect.options.length - 1; i >= 0; i--) {
                                const opt = typeSelect.options[i];
                                if (!/etude/i.test(opt.text)) {
                                    typeSelect.remove(i);
                                }
                            }
                        } else {
                            typeSelect.innerHTML = originalTypeOptions;
                        }
                    }
                })
                .catch(error => console.error(error));
        });

        function newDevis() {
            const formulaire = document.getElementById("formulaire");
            const div = document.createElement("div");

            div.innerHTML = `
        <div class="materiel-row">
            <label>Nom
                <input type="text" name="nom" required>
            </label>
            <label>Prix unitaire
                <input type="number" name="pU" step="0.01" value="0" min="0" required>
            </label>
            <label>Quantite
                <input type="number" name="quantite" value="0" min="0" required>
            </label>
            <button type="button" class="btn-remove-row" onclick="this.closest('.materiel-row').remove()">Supprimer</button>
        </div>
    `;
            formulaire.appendChild(div);
        }

    </script>
            </div>
        </div>
    </div>

</body>

</html>
