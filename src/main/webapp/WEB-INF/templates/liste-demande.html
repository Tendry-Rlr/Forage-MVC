<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste demande</title>
    <link rel="stylesheet" th:href="@{/ressources/css/style.css}">
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container">
        <div class="form-card">
            <div class="card-header">
                <h4>Liste des demandes</h4>
            </div>
            <div class="card-body">

    <table border="1">

        <tr>
            <td>Id demande</td>
            <td>Client</td>
            <td>Lieu</td>
            <td>Date</td>
            <td>Statut</td>
            <td>Action1</td>
            <td>Action2</td>
            <td>Action3</td>
        </tr>

        <th:block th:each="demande : ${demandes}">
            <tr th:each="demandeStatuts : ${demande.getDemandeStatuts()}">
                <td th:text="${demande.getId_demande()}"></td>
                <td th:text="${demande.getClient().getNom_client()}"></td>
                <td th:text="${demande.getLieu()}"></td>
                <td th:text="${demandeStatuts.getDate()}"></td>
                <td th:text="${demandeStatuts.getStatut().getSigne()}"></td>
                <td><a th:href="@{/supprimer/{id}(id=${demande.getId_demande()})}">Supprimer</a></td>
                <td><a
                        th:href="@{/update/{id_demande}/{id_demande_statut}(id_demande=${demande.getId_demande()},id_demande_statut=${demandeStatuts.getId_demande_statut()})}">Modifier</a>
                </td>
                <td th:if="${demandeStatuts.getStatut().getId_statut() == 2}"><a
                        th:href="@{/voir-devis/{id_client}/{id_demande}(id_client=${demande.getClient().getId_client()}, id_demande=${demande.getId_demande()})}">Voir
                        devis</a></td>
                <td th:if="${demandeStatuts.getStatut().getId_statut() != 2}">Pas valide</a></td>
            </tr>
        </th:block>
    </table>
            </div>
        </div>
    </div>

</body>

</html>
